We then map this against the entry requirements of hundreds of global universities to identify realistic yet ambitious targets — shortlisting programs where you have the highest chance of admission AND scholarship.

This is not a generic service. Every evaluation is personalised and delivered by a specialist counselor with experience in your target country.`,steps:["Submit your academic documents","Meet your dedicated counselor","Receive your profile report within 48 hours","Get your university shortlist with admission probability ratings"],color:"#0057FF"},{id:"uni-selection",icon:"🏛",title:"University Selection",tagline:"The right university changes everything.",desc:`Choosing the wrong university can cost you years and thousands of dollars. Choosing the right one can define your career trajectory for decades. Our strategic university selection process is one of the most critical steps we guide you through.

Our counselors have direct relationships with international recruitment offices at over 50 universities globally, giving you insider knowledge that no public source provides.`,steps:["Profile analysis complete","Research 100+ programs matching your goals","Shortlist 6–10 target universities","Strategy meeting to finalise your list"],color:"#E8173A"},{id:"application",icon:"📝",title:"Application Assistance",tagline:"A great application tells your story powerfully.",desc:`The application package — including your Statement of Purpose, recommendation letters, CV/resume, and supporting documents — is your voice to the admissions committee. We help you craft a compelling narrative that stands out from thousands of applicants.

Our SOP writers are Masters and PhD graduates who know what admissions officers are looking for. We don't write your SOP for you — we work with you through multiple rounds of drafts, editing, and refinement until it authentically represents your voice and vision.

We also guide your academic referees on how to write impactful recommendation letters, manage all application portals, track deadlines, and submit everything before it's due.`,steps:["SOP strategy session with your counselor","Draft 1 → 2 → 3 review cycle","Recommendation letter briefing for referees","Final submission with checklist verification"],color:"#F5A623"},{id:"scholarship",icon:"🎓",title:"Scholarship Guidance",tagline:"Tuition money you don't have to pay back.",desc:`Scholarships are not just for academic toppers. They exist for students from diverse backgrounds, specific nationalities, unique research interests, and financial need. Our scholarship team knows where to find them.

We maintain a continuously updated database of 500+ scholarships across all study destinations. For each student, we identify 10–15 scholarship opportunities they genuinely qualify for, then build a scholarship application calendar with deadlines, requirements, and submission strategy.

Our students have collectively received over BDT 50 crore in scholarship funding across their study programs.`,steps:["Scholarship database matching to your profile","Application calendar creation","Essay writing support for scholarship applications","Submission tracking and follow-up"],color:"#9333EA"},{id:"visa",icon:"✈️",title:"Visa Processing",tagline:"100% visa success — not a marketing claim, a track record.",desc:`Visa rejection is devastating after months of preparation. Our 100% visa success rate reflects the thoroughness and precision with which we handle every visa application. We leave nothing to chance.

We know the specific requirements of each country's visa system and tailor our approach accordingly. No generic checklists — precise, country-specific guidance every time.`,steps:["Document collection & verification","Financial statement preparation","Mock interview preparation (where required)","Visa application submission & tracking"],color:"#0057FF"},{id:"pre-departure",icon:"🌏",title:"Pre-Departure Guidance",tagline:"Arrive confident. Not confused.",desc:`Getting your offer letter and visa is a milestone — but the journey continues. Moving to a new country for the first time can be overwhelming. Our pre-departure support ensures you arrive prepared, confident, and ready to hit the ground running.

We cover: accommodation search and booking strategy, travel insurance selection, packing essentials, arrival procedures at the destination airport, opening a bank account abroad, local SIM cards, student ID processes, and the all-important orientation week advice.

We also connect you with our alumni network in your destination city — real students who've done it before and are happy to help newcomers settle in.`,steps:["Accommodation search guidance","Travel insurance and logistics","Financial setup (bank account, cards)","Alumni network introduction in your city"],color:"#25D366"},{id:"test-prep",icon:"📚",title:"Test Preparation",tagline:"The right score opens the right doors.",desc:`English language proficiency tests — IELTS, TOEFL, PTE — are mandatory for university admission. GRE or GMAT may be required for postgraduate and MBA programs. Achieving the score you need requires targeted preparation, not just practice.

For Bangladeshi students, the UK offers particular advantages: English-medium instruction, a geographically close timezone for family communication, a vibrant South Asian diaspora community, and the new Graduate Route visa — which allows international graduates to remain in the UK for two years after completing their degree to work and explore career opportunities.

The UK's 2-year MSc programs are especially popular, offering world-class credentials in a focused, cost-effective timeframe.`,universities:["University of Oxford","University of Cambridge","UCL (University College London)","University of Edinburgh","Imperial College London","University of Manchester","University of Warwick","King's College London"],intakes:["September (Main)","January (Select programs)"],fees:"£15,000 – £35,000 per year",scholarships:["Chevening Scholarship","Commonwealth Scholarship","British Council GREAT Scholarship","University Merit Awards"],postStudy:"2-year Graduate Route Visa",visa:"Student Visa (formerly Tier 4)",ielts:"6.0 – 7.0 (program specific)"},{id:"usa",flag:"🇺🇸",name:"United States",color:"#B22234",hero:"Study in the USA — Research, Innovation, and Opportunity",desc:`The United States hosts more international students than any other country in the world — and for good reason. From the Ivy League to state universities, the US offers an unmatched breadth of academic programs, world-class research facilities, and career opportunities.

Toronto, Vancouver, and Montreal regularly rank among the world's most livable cities, and Canada's welcoming, multicultural society makes Bangladeshi students feel at home from day one.`,universities:["University of Toronto","McGill University","University of British Columbia","University of Waterloo","McMaster University","University of Alberta","University of Ottawa"],intakes:["September (Main)","January","May (Limited programs)"],fees:"CAD $20,000 – $45,000 per year",scholarships:["Vanier Canada Graduate Scholarships","Province-specific scholarships","University Merit Awards","Ontario Graduate Scholarship"],postStudy:"PGWP: up to 3 years",visa:"Study Permit",ielts:"6.5 – 7.0 (program specific)"},{id:"australia",flag:"🇦🇺",name:"Australia",color:"#00008B",hero:"Study in Australia — World Rankings, Remarkable Lifestyle",desc:`Eight Australian universities rank in the global top 100, making Australia one of the highest-concentration destinations for world-class education. The University of Melbourne, ANU, and University of Sydney consistently rank among the world's elite institutions.

Australia's Temporary Graduate visa (subclass 485) allows graduates to remain and work for 2-4 years after graduation, and the pathway to Australian Permanent Residency through skilled migration is well-established and achievable.

The quality of life in Australia — sunshine, safety, natural beauty, and a relaxed pace of life — combined with academic excellence makes it a consistently top choice for international students. Australia's proximity to Bangladesh (shorter flight than Europe or Americas) is an added practical advantage.`,universities:["University of Melbourne","Australian National University","University of Sydney","University of Queensland","Monash University","UNSW Sydney","University of Adelaide"],intakes:["February/March (Semester 1)","July/August (Semester 2)"],fees:"AUD $25,000 – $50,000 per year",scholarships:["Australia Awards Scholarships","Endeavour Leadership Program","Research Training Program","University Merit Scholarships"],postStudy:"Subclass 485: 2-4 years",visa:"Student Visa (Subclass 500)",ielts:"6.5 – 7.0 (program specific)"},{id:"germany",flag:"🇩🇪",name:"Germany",color:"#000000",hero:"Study in Germany — World-Class Engineering, Near-Zero Tuition",desc:`Germany offers one of the most extraordinary opportunities in international education: study at a world-class university for €0–€3,000 per year in tuition fees. Public universities in Germany charge only a nominal semester fee (typically €300–€500) — even for international students.

Ireland is the only English-speaking member of the European Union, making it uniquely attractive for students who want an English-medium education while also having access to the broader EU job market after graduation.

The Third Level Graduate Scheme allows international graduates to remain in Ireland for 2 years to seek employment, with strong tech sector demand meaning excellent career prospects for STEM and business graduates.`,universities:["Trinity College Dublin","University College Dublin (UCD)","University College Cork","NUI Galway","Dublin City University","University of Limerick"],intakes:["September (Main)","January (Limited)"],fees:"€10,000 – €25,000 per year",scholarships:["Government of Ireland International Education Scholarship","University Merit Awards","Enterprise Ireland schemes"],postStudy:"2 years (Third Level Graduate Scheme)",visa:"Study Visa",ielts:"6.0 – 6.5 (program specific)"},{id:"nz",flag:"🇳🇿",name:"New Zealand",color:"#00247D",hero:"Study in New Zealand — Top 3% Universities Globally",desc:`All 8 universities in New Zealand rank in the top 3% of universities globally — making New Zealand one of the highest quality-per-university destinations in the world. The University of Auckland consistently ranks in the global top 100.

New Zealand's education system is renowned for its quality and its emphasis on practical, applied learning. The country's small size means students receive more personal attention, smaller class sizes, and better access to faculty than in larger countries.

New Zealand's stunning natural environment, safe and welcoming society, and strong agricultural, engineering, and IT sectors make it an underrated gem for international students seeking quality education and an excellent quality of life.`,universities:["University of Auckland","University of Otago","Victoria University of Wellington","University of Canterbury","Massey University","AUT Auckland"],intakes:["February (Semester 1)","July (Semester 2)"],fees:"NZD $22,000 – $45,000 per year",scholarships:["New Zealand Government Scholarships","University Merit Awards","Prime Minister's Scholarships for Asia"],postStudy:"1-3 years (Post Study Open Work Visa)",visa:"Student Visa",ielts:"6.0 – 6.5 (program specific)"},{id:"uae",flag:"🇦🇪",name:"Dubai / UAE",color:"#009A44",hero:"Study in Dubai — Global City, Regional Hub, Zero Tax",desc:`Dubai has emerged as a genuine global education destination, hosting campuses of prestigious international universities including Heriot-Watt (ranked top 300 globally), Middlesex University, University of Birmingham, and others.
