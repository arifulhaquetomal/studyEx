      `})]})}const jh=[{id:"profile-eval",icon:"📋",title:"Profile Evaluation",tagline:"Know where you stand. Know where you're going.",desc:`Your academic journey abroad starts with an honest, thorough assessment of your profile. Our experienced counselors analyse your academic records, work experience, language test scores, and career aspirations to create a comprehensive picture of your strengths and areas for development.

We then map this against the entry requirements of hundreds of global universities to identify realistic yet ambitious targets — shortlisting programs where you have the highest chance of admission AND scholarship.

This is not a generic service. Every evaluation is personalised and delivered by a specialist counselor with experience in your target country.`,steps:["Submit your academic documents","Meet your dedicated counselor","Receive your profile report within 48 hours","Get your university shortlist with admission probability ratings"],color:"#7A4F2D"},{id:"uni-selection",icon:"🏛",title:"University Selection",tagline:"The right university changes everything.",desc:`Choosing the wrong university can cost you years and thousands of dollars. Choosing the right one can define your career trajectory for decades. Our strategic university selection process is one of the most critical steps we guide you through.

We consider: global rankings, program reputation, scholarship availability, post-study work rights, location, alumni network, employment outcomes, and — critically — your admission probability. We don't just recommend prestigious names; we recommend programs where you will thrive.

Our counselors have direct relationships with international recruitment offices at over 50 universities globally, giving you insider knowledge that no public source provides.`,steps:["Profile analysis complete","Research 100+ programs matching your goals","Shortlist 6–10 target universities","Strategy meeting to finalise your list"],color:"#6B1A2E"},{id:"application",icon:"📝",title:"Application Assistance",tagline:"A great application tells your story powerfully.",desc:`The application package — including your Statement of Purpose, recommendation letters, CV/resume, and supporting documents — is your voice to the admissions committee. We help you craft a compelling narrative that stands out from thousands of applicants.

Our SOP writers are Masters and PhD graduates who know what admissions officers are looking for. We don't write your SOP for you — we work with you through multiple rounds of drafts, editing, and refinement until it authentically represents your voice and vision.

We also guide your academic referees on how to write impactful recommendation letters, manage all application portals, track deadlines, and submit everything before it's due.`,steps:["SOP strategy session with your counselor","Draft 1 → 2 → 3 review cycle","Recommendation letter briefing for referees","Final submission with checklist verification"],color:"#7A5C44"},{id:"scholarship",icon:"🎓",title:"Scholarship Guidance",tagline:"Tuition money you don't have to pay back.",desc:`Scholarships are not just for academic toppers. They exist for students from diverse backgrounds, specific nationalities, unique research interests, and financial need. Our scholarship team knows where to find them.

We maintain a continuously updated database of 500+ scholarships across all study destinations. For each student, we identify 10–15 scholarship opportunities they genuinely qualify for, then build a scholarship application calendar with deadlines, requirements, and submission strategy.

Our students have collectively received over BDT 50 crore in scholarship funding across their study programs.`,steps:["Scholarship database matching to your profile","Application calendar creation","Essay writing support for scholarship applications","Submission tracking and follow-up"],color:"#1C3A5C"},{id:"visa",icon:"✈️",title:"Visa Processing",tagline:"100% visa success — not a marketing claim, a track record.",desc:`Visa rejection is devastating after months of preparation. Our 100% visa success rate reflects the thoroughness and precision with which we handle every visa application. We leave nothing to chance.

Our visa team meticulously prepares every document — financial statements, sponsorship letters, English proficiency evidence, accommodation confirmations, travel history — ensuring nothing is missing or inconsistent. We conduct mock visa interviews for countries that require them (USA, Canada), giving you the confidence to present yourself professionally.

We know the specific requirements of each country's visa system and tailor our approach accordingly. No generic checklists — precise, country-specific guidance every time.`,steps:["Document collection & verification","Financial statement preparation","Mock interview preparation (where required)","Visa application submission & tracking"],color:"#3D2B1F"},{id:"pre-departure",icon:"🌏",title:"Pre-Departure Guidance",tagline:"Arrive confident. Not confused.",desc:`Getting your offer letter and visa is a milestone — but the journey continues. Moving to a new country for the first time can be overwhelming. Our pre-departure support ensures you arrive prepared, confident, and ready to hit the ground running.

We cover: accommodation search and booking strategy, travel insurance selection, packing essentials, arrival procedures at the destination airport, opening a bank account abroad, local SIM cards, student ID processes, and the all-important orientation week advice.

We also connect you with our alumni network in your destination city — real students who've done it before and are happy to help newcomers settle in.`,steps:["Accommodation search guidance","Travel insurance and logistics","Financial setup (bank account, cards)","Alumni network introduction in your city"],color:"#4A5C44"},{id:"test-prep",icon:"📚",title:"Test Preparation",tagline:"The right score opens the right doors.",desc:`English language proficiency tests — IELTS, TOEFL, PTE — are mandatory for university admission. GRE or GMAT may be required for postgraduate and MBA programs. Achieving the score you need requires targeted preparation, not just practice.

Our test preparation programs are led by experienced instructors who have themselves achieved top scores. We run intensive weekend workshops, one-on-one tutoring sessions, and provide comprehensive practice materials.
